<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>api-mirror dashboard</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --border: #2a2d3a;
        --text: #e2e8f0;
        --muted: #64748b;
        --accent: #6366f1;
        --green: #22c55e;
        --blue: #3b82f6;
        --yellow: #eab308;
        --red: #ef4444;
        --orange: #f97316;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        min-height: 100vh;
      }

      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .logo {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--accent);
      }
      .logo span {
        color: var(--text);
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
      }
      .status-label {
        font-size: 12px;
        color: var(--muted);
      }

      .controls {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
      }
      .control-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .control-label {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }
      .toggle {
        position: relative;
        width: 40px;
        height: 22px;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle-slider {
        position: absolute;
        inset: 0;
        background: var(--border);
        border-radius: 22px;
        cursor: pointer;
        transition: 0.2s;
      }
      .toggle-slider::before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.2s;
      }
      .toggle input:checked + .toggle-slider {
        background: var(--accent);
      }
      .toggle input:checked + .toggle-slider::before {
        transform: translateX(18px);
      }
      .latency-input {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 6px;
        padding: 4px 10px;
        width: 80px;
        font-size: 13px;
      }
      .latency-input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .btn {
        padding: 5px 14px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 12px;
        cursor: pointer;
        transition: 0.15s;
        white-space: nowrap;
      }
      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-danger {
        border-color: transparent;
        background: rgba(239, 68, 68, 0.1);
        color: var(--red);
      }
      .btn-danger:hover {
        background: rgba(239, 68, 68, 0.2);
      }
      .btn-primary {
        border-color: var(--accent);
        background: rgba(99, 102, 241, 0.15);
        color: var(--accent);
      }
      .btn-primary:hover {
        background: rgba(99, 102, 241, 0.3);
      }
      .sep {
        width: 1px;
        height: 24px;
        background: var(--border);
      }

      main {
        padding: 24px;
        max-width: 1100px;
        margin: 0 auto;
      }
      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .count-badge {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2px 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }
      .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }
      .empty h3 {
        font-size: 16px;
        color: var(--text);
        margin-bottom: 8px;
      }
      .empty p {
        font-size: 13px;
        line-height: 1.6;
      }
      .empty code {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 6px;
        font-family: monospace;
        font-size: 12px;
        color: var(--accent);
      }

      .recording-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .recording-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        transition: border-color 0.15s;
      }
      .recording-card:hover {
        border-color: #3a3d4a;
      }
      .recording-card.expanded {
        border-color: var(--accent);
      }

      .card-header {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        user-select: none;
      }
      .method-badge {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 5px;
        min-width: 52px;
        text-align: center;
        letter-spacing: 0.5px;
      }
      .GET {
        background: rgba(34, 197, 94, 0.15);
        color: var(--green);
      }
      .POST {
        background: rgba(59, 130, 246, 0.15);
        color: var(--blue);
      }
      .PUT {
        background: rgba(234, 179, 8, 0.15);
        color: var(--yellow);
      }
      .PATCH {
        background: rgba(249, 115, 22, 0.15);
        color: var(--orange);
      }
      .DELETE {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
      }

      .card-path {
        flex: 1;
        font-family: monospace;
        font-size: 13px;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .status-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 5px;
      }
      .s2xx {
        background: rgba(34, 197, 94, 0.12);
        color: var(--green);
      }
      .s4xx {
        background: rgba(234, 179, 8, 0.12);
        color: var(--yellow);
      }
      .s5xx {
        background: rgba(239, 68, 68, 0.12);
        color: var(--red);
      }
      .card-time {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
      }
      .edited-tag {
        font-size: 10px;
        color: var(--orange);
        background: rgba(249, 115, 22, 0.1);
        border: 1px solid rgba(249, 115, 22, 0.2);
        border-radius: 4px;
        padding: 1px 6px;
      }
      .chevron {
        color: var(--muted);
        font-size: 12px;
        transition: transform 0.2s;
      }
      .recording-card.expanded .chevron {
        transform: rotate(90deg);
      }

      .card-body {
        display: none;
        border-top: 1px solid var(--border);
        padding: 16px;
      }
      .recording-card.expanded .card-body {
        display: block;
      }
      .editor-label {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }
      .json-editor {
        width: 100%;
        min-height: 200px;
        max-height: 500px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: "Cascadia Code", "Fira Code", monospace;
        font-size: 12px;
        padding: 12px;
        resize: vertical;
        line-height: 1.6;
      }
      .json-editor:focus {
        outline: none;
        border-color: var(--accent);
      }
      .card-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        justify-content: flex-end;
      }
      .save-status {
        font-size: 12px;
        color: var(--green);
        margin-right: auto;
        align-self: center;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .save-status.visible {
        opacity: 1;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 18px;
        font-size: 13px;
        color: var(--text);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        transform: translateY(20px);
        opacity: 0;
        transition: 0.25s;
        pointer-events: none;
        z-index: 100;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
      .toast.error {
        border-color: var(--red);
        color: var(--red);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: inline-block;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">api<span>-mirror</span></div>
      <div class="header-right">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-label" id="statusLabel">loading…</span>
      </div>
    </header>

    <div class="controls">
      <div class="control-group">
        <span class="control-label">Mirror Mode</span>
        <label class="toggle">
          <input
            type="checkbox"
            id="mirrorToggle"
            onchange="toggleMirror(this.checked)"
          />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="sep"></div>
      <div class="control-group">
        <span class="control-label">Latency (ms)</span>
        <input
          type="number"
          class="latency-input"
          id="latencyInput"
          min="0"
          max="30000"
          step="100"
          value="0"
          onchange="setLatency(this.value)"
        />
      </div>
      <div class="sep"></div>
      <div class="control-group">
        <span class="control-label">Target</span>
        <span
          id="targetLabel"
          style="font-size: 12px; color: var(--muted); font-family: monospace"
          >—</span
        >
      </div>
      <div style="margin-left: auto">
        <button class="btn" onclick="loadRecordings()">⟳ Refresh</button>
      </div>
    </div>

    <main>
      <div class="section-header">
        <span class="section-title">Recordings</span>
        <span class="count-badge" id="countBadge">0</span>
      </div>
      <div class="recording-list" id="recordingList"></div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
      const $ = (id) => document.getElementById(id);

      let autoRefreshInterval = null;

      function showToast(msg, isError = false) {
        const t = $("toast");
        t.textContent = msg;
        t.className = "toast show" + (isError ? " error" : "");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => (t.className = "toast"), 2500);
      }

      function formatTime(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        return (
          d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) +
          " " +
          d.toLocaleDateString([], { month: "short", day: "numeric" })
        );
      }

      function statusClass(code) {
        if (!code) return "";
        if (code < 300) return "s2xx";
        if (code < 500) return "s4xx";
        return "s5xx";
      }

      async function loadConfig() {
        const res = await fetch("/_mirror/api/config");
        const cfg = await res.json();
        $("mirrorToggle").checked = cfg.mirrorMode;
        $("latencyInput").value = cfg.latency || 0;
        $("targetLabel").textContent = cfg.target || "—";
        $("statusLabel").textContent = cfg.mirrorMode
          ? "Mirror Mode"
          : `Proxy → ${cfg.target || "no target"}`;
        $("statusDot").style.background = cfg.mirrorMode
          ? "var(--blue)"
          : "var(--green)";
        $("statusDot").style.boxShadow = cfg.mirrorMode
          ? "0 0 6px var(--blue)"
          : "0 0 6px var(--green)";
      }

      async function toggleMirror(val) {
        await fetch("/_mirror/api/config", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mirrorMode: val }),
        });
        loadConfig();
        showToast(
          val
            ? "Mirror mode ON — serving from recordings"
            : "Proxy mode ON — forwarding to target",
        );
      }

      async function setLatency(val) {
        const ms = parseInt(val, 10) || 0;
        await fetch("/_mirror/api/config", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ latency: ms }),
        });
        showToast(`Latency set to ${ms}ms`);
      }

      async function loadRecordings() {
        const res = await fetch("/_mirror/api/list");
        const list = await res.json();
        $("countBadge").textContent = list.length;
        const container = $("recordingList");

        if (list.length === 0) {
          container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📡</div>
        <h3>No recordings yet</h3>
        <p>Make requests through the proxy to start recording.<br>
        Try: <code>curl http://localhost:3000/your/api/endpoint</code></p>
      </div>`;
          return;
        }

        // Preserve expanded state
        const expanded = new Set(
          [...container.querySelectorAll(".recording-card.expanded")].map(
            (el) => el.dataset.filename,
          ),
        );

        container.innerHTML = list
          .map(
            (r) => `
    <div class="recording-card ${expanded.has(r.filename) ? "expanded" : ""}" data-filename="${r.filename}">
      <div class="card-header" onclick="toggleCard(this.parentElement)">
        <span class="method-badge ${r.method || ""}">${r.method || "?"}</span>
        <span class="card-path" title="${r.url || r.path || ""}">${r.url || r.path || r.filename}</span>
        <span class="status-badge ${statusClass(r.statusCode)}">${r.statusCode || "?"}</span>
        ${r.editedAt ? '<span class="edited-tag">edited</span>' : ""}
        <span class="card-time">${formatTime(r.recordedAt)}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="card-body">
        <div class="editor-label">Response Body</div>
        <textarea class="json-editor" id="editor-${r.filename}" placeholder="Loading…"></textarea>
        <div class="card-actions">
          <span class="save-status" id="status-${r.filename}">✓ Saved</span>
          <button class="btn btn-danger" onclick="deleteRecording('${r.filename}', this)">Delete</button>
          <button class="btn btn-primary" onclick="saveRecording('${r.filename}', this)">Save Changes</button>
        </div>
      </div>
    </div>`,
          )
          .join("");

        // Load bodies for expanded cards
        container
          .querySelectorAll(".recording-card.expanded")
          .forEach((card) => {
            fetchBody(card.dataset.filename);
          });
      }

      async function toggleCard(card) {
        const wasExpanded = card.classList.contains("expanded");
        card.classList.toggle("expanded");
        if (!wasExpanded) {
          await fetchBody(card.dataset.filename);
        }
      }

      async function fetchBody(filename) {
        const el = $(`editor-${filename}`);
        if (!el || el.dataset.loaded) return;
        const res = await fetch(
          `/_mirror/api/get/${encodeURIComponent(filename)}`,
        );
        const data = await res.json();
        try {
          el.value =
            typeof data.body === "string"
              ? JSON.stringify(JSON.parse(data.body), null, 2)
              : JSON.stringify(data.body, null, 2);
        } catch {
          el.value = data.body || "";
        }
        el.dataset.loaded = "1";
      }

      async function saveRecording(filename, btn) {
        const el = $(`editor-${filename}`);
        const statusEl = $(`status-${filename}`);
        const original = btn.textContent;
        btn.innerHTML = '<span class="spinner"></span>';
        btn.disabled = true;

        try {
          await fetch(`/_mirror/api/update/${encodeURIComponent(filename)}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ body: el.value }),
          });
          statusEl.classList.add("visible");
          setTimeout(() => statusEl.classList.remove("visible"), 2000);
          showToast("Recording updated");
          loadRecordings();
        } catch (e) {
          showToast("Failed to save: " + e.message, true);
        } finally {
          btn.textContent = original;
          btn.disabled = false;
        }
      }

      async function deleteRecording(filename, btn) {
        if (!confirm(`Delete recording for:\n${filename}?`)) return;
        await fetch(`/_mirror/api/delete/${encodeURIComponent(filename)}`, {
          method: "DELETE",
        });
        showToast("Recording deleted");
        loadRecordings();
      }

      // Init
      loadConfig();
      loadRecordings();
      autoRefreshInterval = setInterval(loadRecordings, 5000);
    </script>
  </body>
</html>
